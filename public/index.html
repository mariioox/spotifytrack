<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patience ♫</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-layer">
    <div class="bg-blur" id="bgBlur"></div>
    <div class="bg-overlay"></div>
    <div class="bg-glow-spot" id="bgGlow"></div>
  </div>

  <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>

  <div class="scroll-container">
    <div class="header">
      <div class="header-sub">🎧 teddy bear radio</div>
      <div class="header-name">Patience</div>
    </div>

    <div class="glass-card">
      <div id="loginView" class="view view-hidden">
        <div class="login-state">
          <span class="login-icon">🔗</span>
          <p class="login-text"><span class="hl">Patience</span> hasn't connected Spotify yet</p>
          <a id="loginBtn" class="btn-spotify">Login with Spotify</a>
        </div>
      </div>

      <div id="notPlayingView" class="view view-hidden">
        <div class="empty-state">
          <span class="empty-icon">🎵</span>
          <p class="empty-text"><span class="hl">Patience</span> is taking a cozy little break ✨</p>
        </div>
      </div>

      <div id="errorView" class="view view-hidden">
        <div class="error-state">
          <span class="error-icon">⚙️</span>
          <p class="error-text" id="errorText"></p>
        </div>
      </div>

      <div id="trackView" class="view view-hidden">
        <div class="art-section">
          <div class="art-wrapper" id="artWrapper">
            <div class="pulse-ring"></div>
            <img id="albumArt" class="album-art" alt="album art" />
            <div class="vinyl-grooves"></div>
            <div class="vinyl-center">🧸</div>
          </div>
        </div>

        <div class="eq-bars" id="trackEqualizer">
          <div class="eq-bar" style="height:4px"></div>
          <div class="eq-bar" style="height:10px"></div>
          <div class="eq-bar" style="height:7px"></div>
          <div class="eq-bar" style="height:14px"></div>
          <div class="eq-bar" style="height:6px"></div>
        </div>

        <div class="track-name" id="trackName"></div>
        <div class="artists" id="trackArtists"></div>

        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill">
              <div class="progress-shimmer"></div>
            </div>
          </div>
          <div class="time">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>

        <div class="badge-row">
          <span class="badge playing" id="nowPlayingBadge">♪ now playing</span>
          <span class="badge" id="sourceBadge">spotify</span>
        </div>
      </div>
    </div>

    <div class="stats-bar">
      <span class="stat-item"><span class="num" id="statToday">—</span> songs today</span>
      <span class="stat-dot">●</span>
      <span class="stat-item"><span class="num" id="statTotal">—</span> total</span>
      <span class="stat-dot">●</span>
      <span class="stat-item"><span class="num" id="statLastSeen">—</span></span>
    </div>

    <div class="history-section">
      <div class="history-header">
        <span class="history-title">Recently played</span>
        <span class="history-count" id="historyCount"></span>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="footer-text">♫ spotifytrack</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
