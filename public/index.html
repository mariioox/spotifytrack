<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patience ♫</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 600px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(29,185,84,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    @keyframes bar {
      0% { height: 4px; }
      50% { height: 20px; }
      100% { height: 4px; }
    }

    .header {
      margin-bottom: 2rem;
    }

    .listening-for {
      font-size: 0.8rem;
      font-weight: 400;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 0.3rem;
    }

    .name {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1db954 0%, #1ed760 50%, #169c46 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .art-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 1.5rem;
    }

    .art-wrapper::before {
      content: '';
      position: absolute;
      inset: -20px;
      background: conic-gradient(from 0deg, #1db954, #1ed760, #1db954, #169c46, #1db954);
      border-radius: 50%;
      opacity: 0.3;
      animation: spin 8s linear infinite;
      filter: blur(10px);
    }

    .art-wrapper.paused::before {
      animation: none;
      opacity: 0.1;
    }

    .album-art {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 40px rgba(29,185,84,0.15), 0 8px 32px rgba(0,0,0,0.6);
      animation: spin 12s linear infinite;
      z-index: 1;
    }

    .album-art.paused {
      animation: none;
    }

    .vinyl-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: #0a0a0a;
      border-radius: 50%;
      border: 3px solid #333;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vinyl-center::after {
      content: '';
      width: 10px;
      height: 10px;
      background: #1db954;
      border-radius: 50%;
    }

    .track-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      animation: fadeIn 0.5s ease-out;
    }

    .artists {
      font-size: 1.05rem;
      color: #999;
      margin-bottom: 0.4rem;
    }

    .album-name {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.5rem;
    }

    .progress-bar {
      width: 300px;
      height: 4px;
      background: #222;
      border-radius: 4px;
      margin: 1rem auto;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1db954, #1ed760);
      border-radius: 4px;
      transition: width 1s linear;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -4px;
      top: -3px;
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .progress-bar:hover .progress-fill::after {
      opacity: 1;
    }

    .time {
      display: flex;
      justify-content: space-between;
      width: 300px;
      margin: 0 auto;
      font-size: 0.75rem;
      color: #555;
      font-weight: 500;
    }

    .not-playing-state {
      animation: fadeIn 0.8s ease-out;
    }

    .not-playing-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.3;
      animation: float 3s ease-in-out infinite;
    }

    .not-playing-text {
      font-size: 1rem;
      color: #555;
      font-weight: 300;
      line-height: 1.6;
    }

    .not-playing-text span {
      color: #1db954;
      font-weight: 600;
    }

    .equalizer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 24px;
      margin-top: 1rem;
      opacity: 0.5;
    }

    .equalizer.active .eq-bar {
      animation: bar 0.6s ease-in-out infinite alternate;
    }

    .eq-bar {
      width: 3px;
      background: #1db954;
      border-radius: 2px;
      height: 4px;
    }

    .eq-bar:nth-child(1) { animation-delay: 0s; }
    .eq-bar:nth-child(2) { animation-delay: 0.1s; }
    .eq-bar:nth-child(3) { animation-delay: 0.2s; }
    .eq-bar:nth-child(4) { animation-delay: 0.3s; }
    .eq-bar:nth-child(5) { animation-delay: 0.4s; }

    .footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .load-state {
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container" id="app">
    <div class="header">
      <div class="listening-for">listening to</div>
      <div class="name">Patience</div>
    </div>
  </div>

  <script>
    const app = document.getElementById('app');

    function formatTime(ms) {
      if (!ms && ms !== 0) return '0:00';
      const s = Math.floor(ms / 1000);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    async function fetchJSON(url) {
      try {
        const ctrl = new AbortController();
        const id = setTimeout(() => ctrl.abort(), 5000);
        const res = await fetch(url, { signal: ctrl.signal });
        clearTimeout(id);
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    function renderLogin() {
      fetchJSON('/api/auth-url').then(r => {
        const url = r?.url || '/login';
        app.innerHTML = `
          <div class="header">
            <div class="listening-for">listening to</div>
            <div class="name">Patience</div>
          </div>
          <div class="not-playing-state">
            <div class="not-playing-icon">🔗</div>
            <div class="not-playing-text">
              <span>Patience</span> hasn't connected Spotify yet
            </div>
            <a href="${url}"
               style="display:inline-block;margin-top:1.2rem;padding:0.7rem 2rem;background:#1db954;color:#000;border-radius:50px;text-decoration:none;font-weight:600;font-size:0.9rem;transition:opacity 0.2s"
               onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">
              Login with Spotify
            </a>
          </div>
          <div class="footer">♫ spotify</div>
        `;
      });
    }

    function renderNotPlaying() {
      app.innerHTML = `
        <div class="header">
          <div class="listening-for">listening to</div>
          <div class="name">Patience</div>
        </div>
        <div class="not-playing-state">
          <div class="not-playing-icon">🎵</div>
          <div class="not-playing-text">
            <span>Patience</span> isn't playing anything right now
          </div>
          <div class="equalizer">
            <div class="eq-bar" style="height:6px"></div>
            <div class="eq-bar" style="height:14px"></div>
            <div class="eq-bar" style="height:10px"></div>
            <div class="eq-bar" style="height:18px"></div>
            <div class="eq-bar" style="height:8px"></div>
          </div>
        </div>
        <div class="footer">♫ spotify</div>
      `;
    }

    function renderTrack(data) {
      if (!data || !data.track) return renderNotPlaying();
      const { track, progress_ms, is_playing } = data;
      const pct = Math.min((progress_ms / track.duration_ms) * 100, 100);
      const paused = is_playing === false;

      app.innerHTML = `
        <div class="header">
          <div class="listening-for">listening to</div>
          <div class="name">Patience</div>
        </div>
        <div class="art-wrapper ${paused ? 'paused' : ''}">
          <img class="album-art ${paused ? 'paused' : ''}"
               src="${track.album_image || ''}"
               alt="${track.album}"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22280%22><rect fill=%22222%22 width=%22280%22 height=%22280%22/></svg>'"
          />
          <div class="vinyl-center"></div>
        </div>
        <div class="equalizer ${is_playing ? 'active' : ''}">
          <div class="eq-bar" style="height:6px"></div>
          <div class="eq-bar" style="height:14px"></div>
          <div class="eq-bar" style="height:10px"></div>
          <div class="eq-bar" style="height:18px"></div>
          <div class="eq-bar" style="height:8px"></div>
        </div>
        <div class="track-name">${track.name}</div>
        <div class="artists">${track.artists.join(', ')}</div>
        <div class="album-name">${track.album}</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${pct}%"></div>
        </div>
        <div class="time">
          <span>${formatTime(progress_ms)}</span>
          <span>${formatTime(track.duration_ms)}</span>
        </div>
        ${!paused ? `<div class="footer">♫ spotify</div>` : `<div class="footer" style="color:#555">paused</div>`}
      `;
    }

    async function poll() {
      const data = await fetchJSON('/api/currently-playing');
      if (data?.error === 'no_token') return renderLogin();
      if (data?.track) return renderTrack(data);
      if (data?.error) {
        app.innerHTML = `
          <div class="header">
            <div class="listening-for">listening to</div>
            <div class="name">Patience</div>
          </div>
          <div class="not-playing-state">
            <div class="not-playing-icon">⚙️</div>
            <div class="not-playing-text" style="font-size:0.8rem;color:#444">
              ${data.error}${data.detail ? ': ' + data.detail : ''}
            </div>
          </div>
          <div class="footer">♫ spotify</div>
        `;
        return;
      }
      renderNotPlaying();
    }

    poll();
    setInterval(poll, 3000);
  </script>
</body>
</html>
